<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Hospital Log</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background-color: #cbd5e1; }
    .sp        { padding: 20px; }
    .sp-list   { padding: 20px 20px 96px; }
    .sp-card   { padding: 16px 20px; }
    .sp-item   { padding: 12px 20px; }
    .input {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 0.75rem;
      padding: 0.625rem 0.75rem; font-size: 0.875rem; outline: none;
      transition: box-shadow 0.15s; background: white;
    }
    .input:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.2); border-color: #93c5fd; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, createContext, useContext } = React;

/* ───────────── AppContext ───────────── */
const STORAGE_KEYS = { profile: 'hospital_profile', records: 'hospital_records', family: 'hospital_family' };

function loadFromStorage(key, fallback) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; } catch { return fallback; }
}
function saveToStorage(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

const AppContext = createContext(null);

function AppProvider({ children }) {
  const [profile, setProfile] = useState(() => loadFromStorage(STORAGE_KEYS.profile, {
    bloodType: '', birthYear: '', birthMonth: '', birthDay: '', height: '', weight: '',
    conditions: [], allergies: [], currentMedications: [],
  }));
  const [records, setRecords] = useState(() => loadFromStorage(STORAGE_KEYS.records, []));
  const [family, setFamily]   = useState(() => loadFromStorage(STORAGE_KEYS.family, []));

  function updateProfile(p)    { setProfile(p); saveToStorage(STORAGE_KEYS.profile, p); }
  function addRecord(r)        { const u = [{ ...r, id: Date.now().toString(), createdAt: new Date().toISOString() }, ...records]; setRecords(u); saveToStorage(STORAGE_KEYS.records, u); }
  function updateRecord(id, d) { const u = records.map(r => r.id === id ? { ...r, ...d } : r); setRecords(u); saveToStorage(STORAGE_KEYS.records, u); }
  function deleteRecord(id)    { const u = records.filter(r => r.id !== id); setRecords(u); saveToStorage(STORAGE_KEYS.records, u); }
  function addFamily(e)        { const u = [{ ...e, id: Date.now().toString() }, ...family]; setFamily(u); saveToStorage(STORAGE_KEYS.family, u); }
  function deleteFamily(id)    { const u = family.filter(f => f.id !== id); setFamily(u); saveToStorage(STORAGE_KEYS.family, u); }

  return (
    <AppContext.Provider value={{ profile, updateProfile, records, addRecord, updateRecord, deleteRecord, family, addFamily, deleteFamily }}>
      {children}
    </AppContext.Provider>
  );
}
function useApp() { return useContext(AppContext); }

/* ───────────── HomeScreen ───────────── */
const YEARS  = Array.from({ length: 100 }, (_, i) => String(new Date().getFullYear() - i));
const MONTHS = Array.from({ length: 12 },  (_, i) => String(i + 1).padStart(2, '0'));
const DAYS   = Array.from({ length: 31 },  (_, i) => String(i + 1).padStart(2, '0'));

function HomeScreen() {
  const { profile, updateProfile, records, family } = useApp();
  const [showEdit, setShowEdit] = useState(false);

  const isEmpty = !profile.bloodType && !profile.birthYear && !profile.height && !profile.weight &&
    profile.conditions.length === 0 && profile.allergies.length === 0 && profile.currentMedications.length === 0;

  const birthDate = profile.birthYear && profile.birthMonth && profile.birthDay
    ? `${profile.birthYear}년 ${profile.birthMonth}월 ${profile.birthDay}일` : null;

  const age = (() => {
    if (!profile.birthYear || !profile.birthMonth || !profile.birthDay) return null;
    const today = new Date();
    const birth = new Date(profile.birthYear, profile.birthMonth - 1, profile.birthDay);
    let a = today.getFullYear() - birth.getFullYear();
    if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) a--;
    return a;
  })();

  return (
    <div className="sp space-y-3">
      <p className="text-base font-semibold text-gray-500">나의 기록 현황</p>
      <div className="rounded-2xl text-white text-center" style={{ padding: '20px 24px', backgroundColor: '#3b82f6' }}>
        <div className="flex gap-4 justify-center">
          <SummaryItem count={records.length} label="진료 기록" />
          <div className="w-px bg-white/30" />
          <SummaryItem count={family.length} label="가족력" />
        </div>
      </div>
      <hr style={{ borderColor: '#e5e7eb', borderTopWidth: '3px', margin: '4px 0' }} />
      <div className="flex items-center justify-between px-1">
        <p className="text-base font-semibold text-gray-500">나의 건강 정보</p>
        <button onClick={() => setShowEdit(true)} className="flex items-center gap-1 text-xs text-blue-500 font-semibold bg-blue-50 px-3 py-1.5 rounded-full">✏️ 편집</button>
      </div>
      {isEmpty ? (
        <div className="bg-white rounded-2xl border border-dashed border-gray-200 p-8 text-center">
          <p className="text-3xl mb-2">📋</p>
          <p className="text-gray-500 font-medium text-sm">건강 정보를 입력해보세요</p>
          <p className="text-gray-400 text-xs mt-1">병원 방문 시 빠르게 확인할 수 있어요</p>
          <button onClick={() => setShowEdit(true)} className="mt-4 bg-blue-500 text-white text-sm px-5 py-2 rounded-full font-medium">지금 입력하기</button>
        </div>
      ) : (
        <>
          <ProfileCard icon="🩸" title="혈액형" color="bg-red-50 border-red-100" iconBg="bg-red-100">
            {profile.bloodType ? <p className="text-lg font-bold text-red-500">{profile.bloodType}</p> : <p className="text-sm text-gray-400">미입력</p>}
          </ProfileCard>
          <ProfileCard icon="🎂" title="생년월일" color="bg-pink-50 border-pink-100" iconBg="bg-pink-100">
            {birthDate ? (
              <div className="flex items-baseline gap-2">
                <p className="text-sm font-semibold text-pink-600">{birthDate}</p>
                <p className="text-sm text-pink-400">만 {age}세</p>
              </div>
            ) : <p className="text-sm text-gray-400">미입력</p>}
          </ProfileCard>
          <ProfileCard icon="📏" title="키 / 몸무게" color="bg-green-50 border-green-100" iconBg="bg-green-100">
            <div className="flex gap-6">
              <div>
                <p className="text-xs text-gray-400 mb-1">키</p>
                {profile.height ? <p className="text-lg font-bold text-green-600">{profile.height}<span className="text-sm font-normal ml-0.5">cm</span></p> : <p className="text-sm text-gray-400">미입력</p>}
              </div>
              <div>
                <p className="text-xs text-gray-400 mb-1">몸무게</p>
                {profile.weight ? <p className="text-lg font-bold text-green-600">{profile.weight}<span className="text-sm font-normal ml-0.5">kg</span></p> : <p className="text-sm text-gray-400">미입력</p>}
              </div>
            </div>
          </ProfileCard>
          <ProfileCard icon="🏥" title="기저질환" color="bg-orange-50 border-orange-100" iconBg="bg-orange-100">
            <TagList items={profile.conditions} color="bg-orange-100 text-orange-700" empty="없음" />
          </ProfileCard>
          <ProfileCard icon="⚠️" title="알레르기" color="bg-yellow-50 border-yellow-100" iconBg="bg-yellow-100">
            <TagList items={profile.allergies} color="bg-yellow-100 text-yellow-700" empty="없음" />
          </ProfileCard>
          <ProfileCard icon="💊" title="복용 중인 약" color="bg-blue-50 border-blue-100" iconBg="bg-blue-100">
            {profile.currentMedications.length === 0 ? <p className="text-sm text-gray-400">없음</p> : (
              <ul className="space-y-1.5">
                {profile.currentMedications.map((item, i) => (
                  <li key={i} className="text-sm text-blue-700 flex items-center gap-2">
                    <span className="w-1.5 h-1.5 rounded-full bg-blue-400 shrink-0" />{item}
                  </li>
                ))}
              </ul>
            )}
          </ProfileCard>
        </>
      )}
      {showEdit && <EditModal profile={profile} onSave={u => { updateProfile(u); setShowEdit(false); }} onClose={() => setShowEdit(false)} />}
    </div>
  );
}

function SummaryItem({ count, label }) {
  return (
    <div className="text-center">
      <p className="text-xl font-bold leading-none">{count}</p>
      <p className="text-xs opacity-75 mt-0.5">{label}</p>
    </div>
  );
}

function ProfileCard({ icon, title, color, iconBg, children }) {
  return (
    <div className={`rounded-2xl border sp-card ${color}`}>
      <div className="flex items-center gap-2 mb-3">
        <span className={`w-7 h-7 rounded-full flex items-center justify-center text-sm ${iconBg}`}>{icon}</span>
        <span className="text-sm font-semibold text-gray-600">{title}</span>
      </div>
      {children}
    </div>
  );
}

function TagList({ items, color, empty }) {
  if (items.length === 0) return <p className="text-sm text-gray-400">{empty}</p>;
  return (
    <div className="flex flex-wrap gap-2">
      {items.map((item, i) => <span key={i} className={`px-3 py-1 rounded-full text-xs font-medium ${color}`}>{item}</span>)}
    </div>
  );
}

function EditModal({ profile, onSave, onClose }) {
  const [form, setForm] = useState({
    bloodType: profile.bloodType ?? '', birthYear: profile.birthYear ?? '',
    birthMonth: profile.birthMonth ?? '', birthDay: profile.birthDay ?? '',
    height: profile.height ?? '', weight: profile.weight ?? '',
    conditions: profile.conditions.join(', '), allergies: profile.allergies.join(', '),
    currentMedications: profile.currentMedications.join(', '),
  });
  const toArray = str => str.split(',').map(s => s.trim()).filter(Boolean);
  const handleSave = () => onSave({
    bloodType: form.bloodType, birthYear: form.birthYear, birthMonth: form.birthMonth, birthDay: form.birthDay,
    height: form.height, weight: form.weight,
    conditions: toArray(form.conditions), allergies: toArray(form.allergies), currentMedications: toArray(form.currentMedications),
  });

  return (
    <div className="fixed inset-0 bg-black/50 flex items-end justify-center z-50">
      <div className="bg-white w-full max-w-sm rounded-t-3xl px-6 pt-6 pb-8 space-y-4 overflow-y-auto" style={{ maxHeight: '90vh' }}>
        <div className="flex items-center justify-between mb-2">
          <h3 className="text-base font-bold text-gray-800">건강 정보 편집</h3>
          <button onClick={onClose} className="text-gray-400 w-7 h-7 flex items-center justify-center rounded-full bg-gray-100">✕</button>
        </div>
        <Field label="혈액형">
          <select value={form.bloodType} onChange={e => setForm(p => ({ ...p, bloodType: e.target.value }))} className="input">
            <option value="">선택하세요</option>
            {['A+','A-','B+','B-','AB+','AB-','O+','O-'].map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="생년월일">
          <div className="flex gap-2">
            <select value={form.birthYear}  onChange={e => setForm(p => ({ ...p, birthYear: e.target.value }))}  className="input"><option value="">년도</option>{YEARS.map(y => <option key={y} value={y}>{y}년</option>)}</select>
            <select value={form.birthMonth} onChange={e => setForm(p => ({ ...p, birthMonth: e.target.value }))} className="input"><option value="">월</option>{MONTHS.map(m => <option key={m} value={m}>{m}월</option>)}</select>
            <select value={form.birthDay}   onChange={e => setForm(p => ({ ...p, birthDay: e.target.value }))}   className="input"><option value="">일</option>{DAYS.map(d => <option key={d} value={d}>{d}일</option>)}</select>
          </div>
        </Field>
        <div className="flex gap-3">
          <Field label="키 (cm)"><input type="number" placeholder="예: 170" value={form.height} onChange={e => setForm(p => ({ ...p, height: e.target.value }))} className="input" /></Field>
          <Field label="몸무게 (kg)"><input type="number" placeholder="예: 65" value={form.weight} onChange={e => setForm(p => ({ ...p, weight: e.target.value }))} className="input" /></Field>
        </div>
        <Field label="기저질환 (쉼표로 구분)"><input type="text" placeholder="예: 고혈압, 당뇨" value={form.conditions} onChange={e => setForm(p => ({ ...p, conditions: e.target.value }))} className="input" /></Field>
        <Field label="알레르기 (쉼표로 구분)"><input type="text" placeholder="예: 페니실린, 땅콩" value={form.allergies} onChange={e => setForm(p => ({ ...p, allergies: e.target.value }))} className="input" /></Field>
        <Field label="복용 중인 약 (쉼표로 구분)"><input type="text" placeholder="예: 아스피린 100mg" value={form.currentMedications} onChange={e => setForm(p => ({ ...p, currentMedications: e.target.value }))} className="input" /></Field>
        <button onClick={handleSave} className="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold text-sm">저장하기</button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div className="flex-1">
      <label className="block text-xs font-semibold text-gray-500 mb-1.5">{label}</label>
      {children}
    </div>
  );
}

/* ───────────── MedicalRecordScreen ───────────── */
const DEPARTMENTS = ['내과','외과','정형외과','이비인후과','피부과','안과','산부인과','소아과','기타'];

function MedicalRecordScreen() {
  const { records, addRecord, updateRecord, deleteRecord } = useApp();
  const [view, setView]                   = useState('list');
  const [activeTab, setActiveTab]         = useState('timeline');
  const [sortDesc, setSortDesc]           = useState(true);
  const [selectedRecord, setSelectedRecord] = useState(null);

  if (view === 'form') return <RecordForm onBack={() => setView('list')} onSave={d => { addRecord(d); setView('list'); }} />;
  if (view === 'edit' && selectedRecord) return <RecordForm initial={selectedRecord} onBack={() => setView('detail')} onSave={d => { updateRecord(selectedRecord.id, d); setView('list'); }} />;
  if (view === 'detail' && selectedRecord) {
    const current = records.find(r => r.id === selectedRecord.id) ?? selectedRecord;
    return <RecordDetail record={current} onBack={() => setView('list')} onEdit={() => setView('edit')} onDelete={() => { deleteRecord(current.id); setView('list'); }} />;
  }

  return (
    <div className="flex flex-col h-full">
      <div className="flex bg-white border-b border-gray-200">
        <MedTabBtn label="날짜순"   active={activeTab === 'timeline'}   onClick={() => setActiveTab('timeline')} />
        <MedTabBtn label="진료과별" active={activeTab === 'department'} onClick={() => setActiveTab('department')} />
      </div>
      <div className="flex-1 overflow-y-auto sp-list">
        {records.length === 0 ? (
          <EmptyState message="아직 진료 기록이 없어요." sub="+ 버튼을 눌러 첫 기록을 추가해보세요." />
        ) : activeTab === 'timeline' ? (
          <>
            <div className="flex justify-end mb-3">
              <button onClick={() => setSortDesc(v => !v)} className="text-xs text-gray-500 font-medium bg-white rounded-full" style={{ padding: '5px 10px', border: '1.5px solid #3b82f6' }}>
                {sortDesc ? '↓ 최신순' : '↑ 오래된순'}
              </button>
            </div>
            <TimelineView records={records} sortDesc={sortDesc} onSelect={r => { setSelectedRecord(r); setView('detail'); }} />
          </>
        ) : (
          <DepartmentView records={records} onSelect={r => { setSelectedRecord(r); setView('detail'); }} />
        )}
      </div>
      <button onClick={() => setView('form')} className="fixed bottom-20 right-4 w-14 h-14 bg-blue-500 text-white rounded-full text-2xl shadow-lg flex items-center justify-center">+</button>
    </div>
  );
}

function MedTabBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ paddingTop: '9px', paddingBottom: '9px' }}
      className={`flex-1 text-sm font-medium border-b-2 transition-colors ${active ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-400'}`}>
      {label}
    </button>
  );
}

function TimelineView({ records, sortDesc, onSelect }) {
  const sorted = [...records].sort((a, b) => sortDesc ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));
  return <div className="space-y-3">{sorted.map(r => <RecordCard key={r.id} record={r} onSelect={onSelect} />)}</div>;
}

function DepartmentView({ records, onSelect }) {
  const grouped = records.reduce((acc, r) => { if (!acc[r.department]) acc[r.department] = []; acc[r.department].push(r); return acc; }, {});
  const entries = Object.entries(grouped);
  return (
    <div>
      {entries.map(([dept, recs], i) => (
        <div key={dept}>
          {i !== 0 && <hr style={{ borderColor: '#e5e7eb', borderTopWidth: '3px', margin: '16px 0' }} />}
          <h3 className="text-base font-semibold text-gray-600 mb-2">{dept}</h3>
          <div className="space-y-2">{recs.map(r => <RecordCard key={r.id} record={r} onSelect={onSelect} />)}</div>
        </div>
      ))}
    </div>
  );
}

function RecordCard({ record, onSelect }) {
  return (
    <button onClick={() => onSelect(record)} className="w-full bg-white rounded-2xl sp-card border border-gray-100 shadow-sm text-left">
      <div className="flex items-start justify-between">
        <div>
          <p className="text-xs text-gray-400 mb-1">{record.date}</p>
          <p className="font-semibold text-gray-800 text-sm">{record.diagnosis}</p>
          <p className="text-xs text-gray-500 mt-1">{record.hospitalName}</p>
        </div>
        <span className="bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded-full font-medium shrink-0">{record.department}</span>
      </div>
      {record.prescription.length > 0 && (
        <div className="mt-2 flex flex-wrap gap-1">
          {record.prescription.map((p, i) => <span key={i} className="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">💊 {p}</span>)}
        </div>
      )}
    </button>
  );
}

function RecordDetail({ record, onBack, onEdit, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  return (
    <div className="sp">
      <button onClick={onBack} className="text-blue-500 text-sm mb-4 block">← 목록으로</button>
      <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm space-y-4">
        <div className="flex items-center justify-between">
          <span className="bg-blue-50 text-blue-600 text-sm px-3 py-1 rounded-full font-medium">{record.department}</span>
          <span className="text-sm text-gray-400">{record.date}</span>
        </div>
        <DetailRow label="병원" value={record.hospitalName} />
        <DetailRow label="병명 / 증상" value={record.diagnosis} />
        {record.prescription.length > 0 && (
          <div>
            <p className="text-xs text-gray-400 mb-2">처방약</p>
            <ul className="space-y-1">
              {record.prescription.map((p, i) => <li key={i} className="text-sm text-gray-700 flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block" />{p}</li>)}
            </ul>
          </div>
        )}
        {record.memo && <div><p className="text-xs text-gray-400 mb-1">메모</p><p className="text-sm text-gray-700 bg-gray-50 rounded-xl p-3">{record.memo}</p></div>}
        <div className="flex gap-2 pt-2">
          <button onClick={onEdit} className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-medium">수정</button>
          <button onClick={() => setConfirmDelete(true)} className="flex-1 border border-red-200 text-red-400 py-2.5 rounded-xl text-sm font-medium">삭제</button>
        </div>
      </div>
      {confirmDelete && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-6">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm">
            <p className="text-gray-800 font-semibold text-center mb-1">기록을 삭제할까요?</p>
            <p className="text-gray-400 text-sm text-center mb-5">삭제하면 복구할 수 없어요.</p>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(false)} className="flex-1 border border-gray-200 text-gray-500 py-2.5 rounded-xl text-sm">취소</button>
              <button onClick={onDelete} className="flex-1 bg-red-500 text-white py-2.5 rounded-xl text-sm font-medium">삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DetailRow({ label, value }) {
  return <div><p className="text-xs text-gray-400 mb-1">{label}</p><p className="font-semibold text-gray-800">{value}</p></div>;
}

function RecordForm({ initial, onBack, onSave }) {
  const [form, setForm] = useState({
    date: initial?.date ?? new Date().toISOString().split('T')[0],
    hospitalName: initial?.hospitalName ?? '', department: initial?.department ?? '',
    diagnosis: initial?.diagnosis ?? '', prescription: initial?.prescription?.join(', ') ?? '', memo: initial?.memo ?? '',
  });
  const update = (field, value) => setForm(p => ({ ...p, [field]: value }));
  const handleSave = () => {
    if (!form.hospitalName || !form.department || !form.diagnosis) return;
    onSave({ date: form.date, hospitalName: form.hospitalName, department: form.department, diagnosis: form.diagnosis, prescription: form.prescription.split(',').map(s => s.trim()).filter(Boolean), memo: form.memo });
  };
  return (
    <div className="sp">
      <button onClick={onBack} className="text-blue-500 text-sm mb-4 block">← 목록으로</button>
      <h2 className="text-lg font-bold text-gray-800 mb-4">{initial ? '진료 기록 수정' : '진료 기록 추가'}</h2>
      <div className="space-y-3">
        <Field label="방문 날짜"><input type="date" value={form.date} onChange={e => update('date', e.target.value)} className="input" /></Field>
        <Field label="병원명 *"><input type="text" placeholder="예: 서울대학교병원" value={form.hospitalName} onChange={e => update('hospitalName', e.target.value)} className="input" /></Field>
        <Field label="진료과 *">
          <select value={form.department} onChange={e => update('department', e.target.value)} className="input">
            <option value="">선택하세요</option>
            {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </Field>
        <Field label="병명 / 증상 *"><input type="text" placeholder="예: 급성 위염" value={form.diagnosis} onChange={e => update('diagnosis', e.target.value)} className="input" /></Field>
        <Field label="처방약 (쉼표로 구분)"><input type="text" placeholder="예: 아목시실린 500mg" value={form.prescription} onChange={e => update('prescription', e.target.value)} className="input" /></Field>
        <Field label="메모"><textarea placeholder="추가로 기억할 내용" value={form.memo} onChange={e => update('memo', e.target.value)} rows={3} className="input resize-none" /></Field>
      </div>
      <button onClick={handleSave} className={`w-full mt-6 py-3 rounded-xl font-medium text-sm text-white ${!form.hospitalName || !form.department || !form.diagnosis ? 'bg-gray-300' : 'bg-blue-500'}`}>저장</button>
    </div>
  );
}

function EmptyState({ message, sub }) {
  return (
    <div className="flex flex-col items-center justify-center py-20 text-center">
      <p className="text-4xl mb-3">🏥</p>
      <p className="text-gray-500 font-medium">{message}</p>
      <p className="text-gray-400 text-sm mt-1">{sub}</p>
    </div>
  );
}

/* ───────────── FamilyHistoryScreen ───────────── */
const RELATIONS = ['아버지','어머니','친할아버지','친할머니','외할아버지','외할머니','형제/자매','기타'];
const RELATION_EMOJI = { '아버지':'👨','어머니':'👩','친할아버지':'👴','친할머니':'👵','외할아버지':'👴','외할머니':'👵','형제/자매':'🧑','기타':'👤' };

function FamilyHistoryScreen() {
  const { family, addFamily, deleteFamily } = useApp();
  const [activeTab, setActiveTab] = useState('relation');
  const [view, setView] = useState('list');

  if (view === 'form') return <FamilyForm onBack={() => setView('list')} onSave={d => { addFamily(d); setView('list'); }} />;

  return (
    <div className="flex flex-col h-full">
      <div className="flex bg-white border-b border-gray-200">
        <FamTabBtn label="관계별" active={activeTab === 'relation'} onClick={() => setActiveTab('relation')} />
        <FamTabBtn label="질병별" active={activeTab === 'disease'}  onClick={() => setActiveTab('disease')} />
      </div>
      <div className="flex-1 overflow-y-auto sp-list">
        {family.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-20 text-center">
            <p className="text-4xl mb-3">👨‍👩‍👧</p>
            <p className="text-gray-500 font-medium">아직 가족력 기록이 없어요.</p>
            <p className="text-gray-400 text-sm mt-1">+ 버튼을 눌러 첫 기록을 추가해보세요.</p>
          </div>
        ) : activeTab === 'relation' ? (
          <ByRelationView records={family} onDelete={deleteFamily} />
        ) : (
          <ByDiseaseView records={family} onDelete={deleteFamily} />
        )}
      </div>
      <button onClick={() => setView('form')} className="fixed bottom-20 right-4 w-14 h-14 bg-blue-500 text-white rounded-full text-2xl shadow-lg flex items-center justify-center">+</button>
    </div>
  );
}

function FamTabBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ paddingTop: '9px', paddingBottom: '9px' }}
      className={`flex-1 text-sm font-medium border-b-2 transition-colors ${active ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-400'}`}>
      {label}
    </button>
  );
}

function ByRelationView({ records, onDelete }) {
  const grouped = records.reduce((acc, r) => { if (!acc[r.relation]) acc[r.relation] = []; acc[r.relation].push(r); return acc; }, {});
  return (
    <div className="space-y-3">
      {Object.entries(grouped).map(([relation, items]) => (
        <div key={relation} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="flex items-center gap-2 bg-gray-50 border-b border-gray-100" style={{ padding: '8px 20px' }}>
            <span className="text-xl">{RELATION_EMOJI[relation] ?? '👤'}</span>
            <span className="text-sm font-bold text-gray-700">{relation}</span>
          </div>
          <ul className="divide-y divide-gray-50">
            {items.map(item => <FamilyItem key={item.id} item={item} onDelete={onDelete} />)}
          </ul>
        </div>
      ))}
    </div>
  );
}

function ByDiseaseView({ records, onDelete }) {
  const grouped = records.reduce((acc, r) => { if (!acc[r.disease]) acc[r.disease] = []; acc[r.disease].push(r); return acc; }, {});
  return (
    <div className="space-y-3">
      {Object.entries(grouped).map(([disease, items]) => (
        <div key={disease} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="bg-purple-50 border-b border-purple-100" style={{ padding: '8px 20px' }}>
            <span className="text-sm font-bold text-purple-700">{disease}</span>
          </div>
          <ul className="divide-y divide-gray-50">
            {items.map(item => <FamilyItem key={item.id} item={item} showRelation onDelete={onDelete} />)}
          </ul>
        </div>
      ))}
    </div>
  );
}

function FamilyItem({ item, showRelation, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  return (
    <>
      <li className="sp-item flex items-start justify-between gap-2">
        <div className="flex items-start gap-2">
          {showRelation && <span className="text-lg mt-0.5">{RELATION_EMOJI[item.relation] ?? '👤'}</span>}
          <div>
            <p className="text-sm font-semibold text-gray-800">{showRelation ? item.relation : item.disease}</p>
            {item.memo && <p className="text-xs text-gray-400 mt-0.5">{item.memo}</p>}
          </div>
        </div>
        <button onClick={() => setConfirmDelete(true)} className="text-gray-300 text-lg shrink-0">✕</button>
      </li>
      {confirmDelete && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-6">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm">
            <p className="text-gray-800 font-semibold text-center mb-1">삭제할까요?</p>
            <p className="text-gray-400 text-sm text-center mb-5">삭제하면 복구할 수 없어요.</p>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(false)} className="flex-1 border border-gray-200 text-gray-500 py-2.5 rounded-xl text-sm">취소</button>
              <button onClick={() => onDelete(item.id)} className="flex-1 bg-red-500 text-white py-2.5 rounded-xl text-sm font-medium">삭제</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function FamilyForm({ onBack, onSave }) {
  const [form, setForm] = useState({ relation: '', disease: '', memo: '' });
  const update = (field, value) => setForm(p => ({ ...p, [field]: value }));
  const handleSave = () => { if (!form.relation || !form.disease) return; onSave(form); };
  return (
    <div className="sp">
      <button onClick={onBack} className="text-blue-500 text-sm mb-4 block">← 목록으로</button>
      <h2 className="text-lg font-bold text-gray-800 mb-4">가족력 추가</h2>
      <div className="space-y-3">
        <Field label="가족 관계 *">
          <select value={form.relation} onChange={e => update('relation', e.target.value)} className="input">
            <option value="">선택하세요</option>
            {RELATIONS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
        </Field>
        <Field label="질병명 *"><input type="text" placeholder="예: 고혈압" value={form.disease} onChange={e => update('disease', e.target.value)} className="input" /></Field>
        <Field label="메모"><textarea placeholder="진단 시기, 경과 등" value={form.memo} onChange={e => update('memo', e.target.value)} rows={3} className="input resize-none" /></Field>
      </div>
      <button onClick={handleSave} className={`w-full mt-6 py-3 rounded-xl font-medium text-sm text-white ${!form.relation || !form.disease ? 'bg-gray-300' : 'bg-blue-500'}`}>저장</button>
    </div>
  );
}

/* ───────────── App ───────────── */
const TABS = [
  { id: 'home',    label: '홈',     icon: '🏠', title: '내 건강 프로필' },
  { id: 'records', label: '진료기록', icon: '🏥', title: '진료 기록' },
  { id: 'family',  label: '가족력',  icon: '👨‍👩‍👧', title: '가족력' },
];

function App() {
  const [activeTab, setActiveTab] = useState('home');
  const currentTab = TABS.find(t => t.id === activeTab);

  return (
    <AppProvider>
      <div className="flex justify-center min-h-screen bg-slate-300">
        <div className="relative w-full max-w-sm min-h-screen bg-gray-50 flex flex-col shadow-2xl">
          <header className="bg-white border-b border-gray-100 flex items-center justify-between"
            style={{ paddingTop: '15px', paddingBottom: '12px', paddingLeft: '24px', paddingRight: '20px' }}>
            <div>
              <p className="text-xs text-blue-400 font-semibold tracking-widest uppercase mb-0.5">My Hospital Log</p>
              <h1 className="text-lg font-bold text-gray-800">{currentTab.title}</h1>
            </div>
            <span className="text-2xl">{currentTab.icon}</span>
          </header>
          <main className="flex-1 overflow-y-auto pb-20">
            {activeTab === 'home'    && <HomeScreen />}
            {activeTab === 'records' && <MedicalRecordScreen />}
            {activeTab === 'family'  && <FamilyHistoryScreen />}
          </main>
          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-gray-100 flex">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-xs font-medium transition-all ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-400'}`}>
                <span className={`text-xl transition-transform ${activeTab === tab.id ? 'scale-110' : 'scale-100'}`}>{tab.icon}</span>
                <span className={activeTab === tab.id ? 'font-semibold' : ''}>{tab.label}</span>
                {activeTab === tab.id && <span className="w-1 h-1 rounded-full bg-blue-500 mt-0.5" />}
              </button>
            ))}
          </nav>
        </div>
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
